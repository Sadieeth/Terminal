<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ghost Matrix Terminal - Quotes</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: transparent; 
            padding: 20px;
            max-width: 85%;
        }
        #quote {
            /* Kept slightly smaller for mobile fit */
            font-size: 24px; 
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
            margin-bottom: 10px;
            line-height: 1.3;
            text-transform: uppercase;
        }
        #author {
            font-size: 16px;
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff;
            letter-spacing: 3px;
            opacity: 0.8;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <div id="quote">"INITIALIZING LIQUIDITY LEVIATHAN..."</div>
        <div id="author">- SYSTEM</div>
    </div>

    <script>
        // --- GREY MATRIX RAIN ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$ÂĄâ‚¬ÂŁ@#%&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) { drops[i] = 1; }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#444444"; 
            ctx.font = fontSize + "px Courier New";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }

        // --- FULL ORIGINAL QUOTES DATABASE ---
        const quotes = [
            {t: "THE TREND IS YOUR FRIEND.", a: "UNKNOWN"},
            {t: "TRADE WHAT YOU SEE, NOT WHAT YOU THINK.", a: "MARKET MAXIM"},
            {t: "CUT YOUR LOSSES SHORT. LET YOUR WINNERS RUN.", a: "ED SEYKOTA"},
            {t: "RISK COMES FROM NOT KNOWING WHAT YOU'RE DOING.", a: "WARREN BUFFETT"},
            {t: "PLAN THE TRADE. TRADE THE PLAN.", a: "TRADING MAXIM"},
            {t: "AMATEURS FOCUS ON REWARDS. PROS FOCUS ON RISK.", a: "UNKNOWN"},
            {t: "MARKETS CAN REMAIN IRRATIONAL LONGER THAN YOU SOLVENT.", a: "KEYNES"},
            {t: "IF YOU CAN'T TAKE A SMALL LOSS, YOU WILL EVENTUALLY TAKE THE MOTHER OF ALL LOSSES.", a: "ED SEYKOTA"},
            {t: "BEAR MARKETS HAVE NO SUPPORT. BULL MARKETS HAVE NO RESISTANCE.", a: "UNKNOWN"},
            {t: "THE GOAL OF A SUCCESSFUL TRADER IS TO MAKE THE BEST TRADES. MONEY IS SECONDARY.", a: "ALEXANDER ELDER"},
            {t: "TRADING DOES NOT JUST REVEAL YOUR CHARACTER; IT ALSO BUILDS IT IF YOU STAY IN THE GAME.", a: "YVAN BYAJEE"},
            {t: "DISCIPLINE IS DOING WHAT NEEDS TO BE DONE, EVEN IF YOU DON'T WANT TO DO IT.", a: "UNKNOWN"},
            {t: "HE WHO DRINKS FROM THE CUP OF FOMO SHALL DROWN IN THE SEA OF RECKONING.", a: "JUSTIN KASE"},
            {t: "PATIENCE IS THE KEY TO THE VAULT.", a: "LIQUIDITY LEVIATHAN"}
        ];

        function updateQuote() {
            const r = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote').textContent = `"${r.t}"`;
            document.getElementById('author').textContent = `- ${r.a}`;
        }

        setInterval(drawMatrix, 60);
        setInterval(updateQuote, 25000); // Rotates every 25 seconds
        updateQuote();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
