<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Quotes</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .quote-container {
            position: relative;
            z-index: 1;
            max-width: 90%;
        }
        .quote-text {
            font-size: 1.5em;
            font-style: italic;
            margin-bottom: 10px;
            word-wrap: break-word;
        }
        .author-text {
            font-size: 1em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <canvas id="m"></canvas>
    
    <div class="quote-container">
        <div class="quote-text" id="q">"THE TREND IS YOUR FRIEND."</div>
        <div class="author-text" id="a">- UNKNOWN</div>
    </div>

    <script>
        // --- MATRIX BACKGROUND ---
        const c = document.getElementById('m');
        const x = c.getContext('2d');
        c.width = window.innerWidth;
        c.height = window.innerHeight;

        const s = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$¥€£@#%&*";
        const f = 16;
        const cl = c.width / f;
        const d = Array(Math.floor(cl)).fill(1);

        function draw() {
            x.fillStyle = "rgba(0, 0, 0, 0.1)";
            x.fillRect(0, 0, c.width, c.height);
            x.fillStyle = "#333"; 
            x.font = f + "px monospace";
            for (let i = 0; i < d.length; i++) {
                const txt = s.charAt(Math.floor(Math.random() * s.length));
                x.fillText(txt, i * f, d[i] * f);
                if (d[i] * f > c.height && Math.random() > 0.975) d[i] = 0;
                d[i]++;
            }
        }
        setInterval(draw, 60);

        // --- TRADER QUOTES ---
        const quotes = [
            {t: "THE TREND IS YOUR FRIEND.", a: "UNKNOWN"},
            {t: "CUT YOUR LOSSES SHORT AND LET YOUR PROFITS RUN.", a: "ED SEYKOTA"},
            {t: "PLAN YOUR TRADE, TRADE YOUR PLAN.", a: "UNKNOWN"},
            {t: "THE MARKET CAN REMAIN IRRATIONAL LONGER THAN YOU CAN REMAIN SOLVENT.", a: "JOHN MAYNARD KEYNES"},
            {t: "RULE NUMBER ONE: NEVER LOSE MONEY. RULE NUMBER TWO: NEVER FORGET RULE NUMBER ONE.", a: "WARREN BUFFETT"},
            {t: "BE FEARFUL WHEN OTHERS ARE GREEDY AND GREEDY WHEN OTHERS ARE FEARFUL.", a: "WARREN BUFFETT"},
            {t: "KNOW WHAT YOU OWN, AND KNOW WHY YOU OWN IT.", a: "PETER LYNCH"},
            {t: "THE STOCK MARKET IS A DEVICE FOR TRANSFERRING MONEY FROM THE IMPATIENT TO THE PATIENT.", a: "WARREN BUFFETT"},
            {t: "PRICE IS WHAT YOU PAY. VALUE IS WHAT YOU GET.", a: "WARREN BUFFETT"},
            {t: "TRADE WHAT'S HAPPENING, NOT WHAT YOU THINK IS GOING TO HAPPEN.", a: "DOUG GREGORY"},
            {t: "THE GOAL OF A SUCCESSFUL TRADER IS TO MAKE THE BEST TRADES. MONEY IS SECONDARY.", a: "ALEXANDER ELDER"},
            {t: "HE WHO DRINKS FROM THE CUP OF FOMO SHALL DROWN IN THE SEA OF RECKONING.", a: "JUSTIN KASE"},
            {t: "DON'T FOCUS ON MAKING MONEY; FOCUS ON PROTECTING WHAT YOU HAVE.", a: "PAUL TUDOR JONES"},
            {t: "WIN OR LOSE, EVERYBODY GETS WHAT THEY WANT OUT OF THE MARKET.", a: "ED SEYKOTA"}
        ];

        function newQuote() {
            const r = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('q').textContent = `"${r.t}"`;
            document.getElementById('a').textContent = `- ${r.a}`;
        }

        // 5-minute auto-rotation
        setInterval(newQuote, 300000); 
        newQuote();

        window.onresize = () => {
            c.width = window.innerWidth;
            c.height = window.innerHeight;
        };
    </script>
</body>
</html>
