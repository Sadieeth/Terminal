<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clean Matrix Terminal - Quotes</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: transparent; 
            padding: 25px;
            max-width: 85%;
        }
        #quote {
            /* Increased size and removed text-shadow for clarity */
            font-size: 28px; 
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 12px;
            line-height: 1.4;
            text-transform: uppercase;
        }
        #author {
            /* Sharp white text without glow */
            font-size: 18px;
            color: #cccccc; 
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <div id="quote">"ESTABLISHING LIQUIDITY..."</div>
        <div id="author">- SYSTEM</div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$¥€£@#%&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) { drops[i] = 1; }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#444444"; 
            ctx.font = fontSize + "px Courier New";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }

        // --- EXPANDED TRADING & PSYCHOLOGY DATABASE ---
        const quotes = [
            {t: "THE GOAL IS NOT TO BE RIGHT, THE GOAL IS TO BE PROFITABLE.", a: "UNKNOWN"},
            {t: "DON'T FOCUS ON MAKING MONEY; FOCUS ON PROTECTING WHAT YOU HAVE.", a: "PAUL TUDOR JONES"},
            {t: "THE MARKET IS A DEVICE FOR TRANSFERRING MONEY FROM THE IMPATIENT TO THE PATIENT.", a: "WARREN BUFFETT"},
            {t: "WINNING TRADERS DO NOT PREDICT; THEY REACT TO WHAT THE MARKET DOES.", a: "UNKNOWN"},
            {t: "YOU DON'T NEED TO KNOW WHAT IS GOING TO HAPPEN NEXT TO MAKE MONEY.", a: "MARK DOUGLAS"},
            {t: "AMATEURS THINK ABOUT HOW MUCH THEY CAN MAKE. PROFESSIONALS THINK ABOUT HOW MUCH THEY CAN LOSE.", a: "JACK SCHWAGER"},
            {t: "TRADING IS 10% MATHEMATICS, 10% PSYCHOLOGY, AND 80% WAITING.", a: "UNKNOWN"},
            {t: "YOUR DISCIPLINE IS THE ONLY THING STANDING BETWEEN YOU AND THE MARKET'S LIQUIDITY.", a: "JUSTIN KASE"},
            {t: "A LOSS IS ONLY A MISTAKE IF YOU DON'T LEARN FROM IT.", a: "MARK MINERVINI"},
            {t: "IT'S NOT WHETHER YOU'RE RIGHT OR WRONG, BUT HOW MUCH MONEY YOU MAKE WHEN YOU'RE RIGHT.", a: "GEORGE SOROS"},
            {t: "IF YOU CAN'T MANAGE YOUR EMOTIONS, YOU CAN'T MANAGE YOUR MONEY.", a: "UNKNOWN"},
            {t: "EVERY BATTLE IS WON BEFORE IT IS EVER FOUGHT.", a: "SUN TZU"},
            {t: "DO NOT ANTICIPATE. WAIT FOR CONFIRMATION.", a: "JESSE LIVERMORE"},
            {t: "RISK ONLY WHAT YOU CAN AFFORD TO LOSE WITHOUT LOSING YOUR MIND.", a: "TRADING MAXIM"},
            {t: "THE MARKET DOES NOT OWE YOU ANYTHING.", a: "UNKNOWN"},
            {t: "BECOME A MASTER OF ONE SETUP RATHER THAN A JACK OF ALL TRADES.", a: "UNKNOWN"},
            {t: "PRICE HAS NO MEMORY. THE MARKET DOESN'T CARE WHERE YOU BOUGHT.", a: "UNKNOWN"},
            {t: "PLAN YOUR TRADE AND TRADE YOUR PLAN.", a: "LINDA RASCHKE"},
            {t: "TRADE THE CHART, NOT THE P&L.", a: "UNKNOWN"}
        ];

        function updateQuote() {
            const r = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote').textContent = `"${r.t}"`;
            document.getElementById('author').textContent = `- ${r.a}`;
        }

        setInterval(drawMatrix, 60);
        setInterval(updateQuote, 20000); // 20-second rotation for a faster desk feel
        updateQuote();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
