<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Original Terminal Quotes</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            /* BACK TO ORIGINAL: Courier New */
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            padding: 25px;
            max-width: 85%;
        }
        .quote-text {
            /* Restored the original terminal font sizing */
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
            line-height: 1.3;
            text-transform: uppercase;
        }
        .author-text {
            font-size: 18px;
            opacity: 0.7;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="container">
        <div class="quote-text" id="q">"RESTORING ORIGINAL TERMINAL..."</div>
        <div id="a" class="author-text">- SYSTEM</div>
    </div>

    <script>
        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$¥€£@#%&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) { drops[i] = 1; }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#333333"; 
            ctx.font = fontSize + "px Courier New";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }

        // --- EXTENDED TRADER QUOTES ---
        const quotes = [
            {t: "THE TREND IS YOUR FRIEND.", a: "UNKNOWN"},
            {t: "CUT YOUR LOSSES SHORT AND LET YOUR PROFITS RUN.", a: "ED SEYKOTA"},
            {t: "PLAN YOUR TRADE, TRADE YOUR PLAN.", a: "UNKNOWN"},
            {t: "THE MARKET CAN REMAIN IRRATIONAL LONGER THAN YOU CAN REMAIN SOLVENT.", a: "JOHN MAYNARD KEYNES"},
            {t: "RULE NUMBER ONE: NEVER LOSE MONEY. RULE NUMBER TWO: NEVER FORGET RULE NUMBER ONE.", a: "WARREN BUFFETT"},
            {t: "BE FEARFUL WHEN OTHERS ARE GREEDY AND GREEDY WHEN OTHERS ARE FEARFUL.", a: "WARREN BUFFETT"},
            {t: "KNOW WHAT YOU OWN, AND KNOW WHY YOU OWN IT.", a: "PETER LYNCH"},
            {t: "THE STOCK MARKET IS A DEVICE FOR TRANSFERRING MONEY FROM THE IMPATIENT TO THE PATIENT.", a: "WARREN BUFFETT"},
            {t: "PRICE IS WHAT YOU PAY. VALUE IS WHAT YOU GET.", a: "WARREN BUFFETT"},
            {t: "TRADE WHAT'S HAPPENING, NOT WHAT YOU THINK IS GOING TO HAPPEN.", a: "DOUG GREGORY"},
            {t: "THE GOAL OF A SUCCESSFUL TRADER IS TO MAKE THE BEST TRADES. MONEY IS SECONDARY.", a: "ALEXANDER ELDER"},
            {t: "DON'T FOCUS ON MAKING MONEY; FOCUS ON PROTECTING WHAT YOU HAVE.", a: "PAUL TUDOR JONES"},
            {t: "HE WHO DRINKS FROM THE CUP OF FOMO SHALL DROWN IN THE SEA OF RECKONING.", a: "JUSTIN KASE"},
            {t: "WINNING TRADERS DO NOT PREDICT; THEY REACT TO WHAT THE MARKET DOES.", a: "UNKNOWN"},
            {t: "YOU DON'T NEED TO KNOW WHAT IS GOING TO HAPPEN NEXT TO MAKE MONEY.", a: "MARK DOUGLAS"},
            {t: "IF YOU CAN'T MANAGE YOUR EMOTIONS, YOU CAN'T MANAGE YOUR MONEY.", a: "UNKNOWN"},
            {t: "DO NOT ANTICIPATE. WAIT FOR CONFIRMATION.", a: "JESSE LIVERMORE"},
            {t: "TRADE THE CHART, NOT THE P&L.", a: "UNKNOWN"}
        ];

        function newQuote() {
            const r = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('q').textContent = `"${r.t}"`;
            document.getElementById('a').textContent = `- ${r.a}`;
        }

        setInterval(drawMatrix, 35);
        setInterval(newQuote, 300000); // 5-minute cycle
        newQuote();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
