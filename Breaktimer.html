<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        /* Bottom Left Fullscreen Toggle */
        .fs-toggle {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: none;
            border: 1px solid #222;
            color: #444;
            padding: 6px 10px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            z-index: 10;
        }
        .fs-toggle:hover {
            color: #888;
            border-color: #444;
        }
        .modes {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            z-index: 2;
        }
        /* Bigger Mode Buttons */
        .modes button {
            background: transparent;
            color: #666;
            border: 1px solid #333;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.1em; /* Increased Size */
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .modes button.active {
            color: #fff;
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
        .timer-display {
            font-size: 10vw; /* Slightly larger for better FS scaling */
            font-weight: 300;
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
            z-index: 2;
        }
        .controls {
            margin-top: 25px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .btn-main {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 40px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1em;
            cursor: pointer;
        }
        .btn-main:hover {
            background: #ccc;
        }
        .btn-reset {
            border: none;
            background: none;
            color: #444;
            cursor: pointer;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-reset:hover {
            color: #888;
        }
    </style>
</head>
<body>

    <button class="fs-toggle" onclick="toggleFS()">FS</button>

    <div class="modes">
        <button id="pomo" class="active" onclick="setTimer(25)">Pomodoro</button>
        <button id="short" onclick="setTimer(5)">Short Break</button>
        <button id="long" onclick="setTimer(15)">Long Break</button>
    </div>

    <div class="timer-display" id="display">25:00</div>

    <div class="controls">
        <button class="btn-main" id="startBtn" onclick="toggleTimer()">Start</button>
        <button class="btn-reset" onclick="resetTimer()">Reset</button>
    </div>

    <script>
        let timeLeft = 1500;
        let timerId = null;
        let isRunning = false;
        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            display.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function setTimer(mins) {
            clearInterval(timerId);
            isRunning = false;
            startBtn.textContent = "Start";
            timeLeft = mins * 60;
            updateDisplay();
            
            document.querySelectorAll('.modes button').forEach(btn => btn.classList.remove('active'));
            if(mins === 25) document.getElementById('pomo').classList.add('active');
            if(mins === 5) document.getElementById('short').classList.add('active');
            if(mins === 15) document.getElementById('long').classList.add('active');
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                startBtn.textContent = "Start";
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert("Session complete.");
                    }
                }, 1000);
                startBtn.textContent = "Pause";
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            startBtn.textContent = "Start";
            const activeMode = document.querySelector('.active').id;
            if(activeMode === 'pomo') timeLeft = 1500;
            else if(activeMode === 'short') timeLeft = 300;
            else timeLeft = 900;
            updateDisplay();
        }

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.querySelector('.fs-toggle').textContent = "Exit";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.querySelector('.fs-toggle').textContent = "FS";
                }
            }
        }
    </script>
</body>
</html>
