<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Small Ghost Matrix</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: transparent; 
            padding: 10px;
        }
        #clock {
            /* Shrinking from 64px to 48px to fit mobile lines */
            font-size: 48px; 
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
            margin: 5px 0;
            white-space: nowrap; /* Forces PM to stay on the same line */
        }
        #date, #day {
            /* Kept at 20px for readability */
            font-size: 20px; 
            color: #ffffff;
            /* Added the same heavy glow as the clock */
            text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <div id="day"></div>
        <div id="clock"></div>
        <div id="date"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$¥€£@#%&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#444444"; 
            ctx.font = fontSize + "px Courier New";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        function updateClock() {
            const now = new Date();
            // Standard time string
            document.getElementById('clock').textContent = now.toLocaleTimeString();
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
            document.getElementById('day').textContent = now.toLocaleDateString(undefined, { weekday: 'long' });
        }

        setInterval(drawMatrix, 60);
        setInterval(updateClock, 1000);
        updateClock();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
