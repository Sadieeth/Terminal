<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leviathan Vision Escape</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BREATH PACER --- */
        .pacer-container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none; 
        }
        .circle {
            width: 80px;
            height: 80px;
            border: 2px solid #222; 
            border-radius: 50%;
            margin: 0 auto;
            animation: breathe 10s infinite ease-in-out;
            box-shadow: 0 0 30px rgba(255,255,255,0.03);
            transition: border-color 1s;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(3.5); opacity: 1; border-color: #fff;}
        }

        /* --- VISION GALLERY (Perfectly Centered Grid) --- */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px; /* Clean architectural spacing */
            padding: 30px;
            opacity: 0; 
            transition: opacity 2.5s ease; 
            z-index: 1;
            box-sizing: border-box;
        }

        body:hover .gallery-overlay {
            opacity: 0.3; 
        }

        .vision-item {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Crops to fill */
            object-position: center; /* Ensures the subject stays centered */
            filter: grayscale(100%); 
            border: 1px solid #111;
            transition: filter 1.2s ease, opacity 0.5s;
        }
        
        .vision-item:hover {
            filter: grayscale(0%);
            opacity: 1 !important;
            border-color: #333;
        }
    </style>
</head>
<body>

    <div class="gallery-overlay">
        <img src="penthouse.jpg" class="vision-item" title="DISCIPLINE">
        <img src="supercar.jpg" class="vision-item" title="PRECISION">
        <img src="sanctuary.jpg" class="vision-item" title="CONTROL">
        <img src="structure.jpg" class="vision-item" title="STRUCTURE">
    </div>

    <div class="pacer-container">
        <div class="circle"></div>
    </div>

</body>
</html>
