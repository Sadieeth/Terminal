<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Escape Terminal</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BREATH PACER (Z-Index 2) --- */
        .pacer-container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none; /* Let hover pass through to gallery */
        }
        .circle {
            width: 80px;
            height: 80px;
            border: 2px solid #555; /* Soft grey ring */
            border-radius: 50%;
            margin: 0 auto;
            animation: breathe 10s infinite ease-in-out;
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
            transition: border-color 1s;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(3.5); opacity: 1; border-color: #fff;}
        }

        /* --- VISION GALLERY OVERLAY (Z-Index 1) --- */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            padding: 20px;
            opacity: 0; /* Hidden by default */
            transition: opacity 2s ease; /* Slow fade */
            z-index: 1;
            box-sizing: border-box;
        }

        /* Slow fade-in when you hover the screen */
        body:hover .gallery-overlay {
            opacity: 0.25; /* Subtle ghost-like presence */
        }

        .vision-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%); /* Zero-bloat styling */
            border: 1px solid #1a1a1a;
            transition: filter 1s;
        }
        .vision-item:hover {
            filter: grayscale(0%) contrast(100%); /* Full color on individual hover */
        }
    </style>
</head>
<body>

    <div class="gallery-overlay">
        <img src="https://images.unsplash.com/photo-1599809275671-b39414ef1915?q=80&w=2000&auto=format&fit=crop" class="vision-item" title="DISCIPLINE">
        
        <img src="https://images.unsplash.com/photo-1614200187524-dc4b892acf16?q=80&w=2000&auto=format&fit=crop" class="vision-item" title="PRECISION">
        
        <img src="https://images.unsplash.com/photo-1542057222-149880481c91?q=80&w=2000&auto=format&fit=crop" class="vision-item" title="CONTROL">
        
        <img src="https://images.unsplash.com/photo-1506197305011-e4359f4f4648?q=80&w=2000&auto=format&fit=crop" class="vision-item" title="STRUCTURE">
    </div>

    <div class="pacer-container">
        <div class="circle"></div>
    </div>

</body>
</html>
