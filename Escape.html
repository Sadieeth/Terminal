<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leviathan Vision Escape</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BREATH PACER --- */
        .pacer-container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none; 
        }
        .circle {
            width: 80px;
            height: 80px;
            border: 2px solid #333; /* Dark ring */
            border-radius: 50%;
            margin: 0 auto;
            animation: breathe 10s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            transition: border-color 1s;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(3.5); opacity: 1; border-color: #fff;}
        }

        /* --- VISION GALLERY (Z-Index 1) --- */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            padding: 30px;
            opacity: 0; /* Hidden by default */
            transition: opacity 2.5s ease; /* Long fade */
            z-index: 1;
            box-sizing: border-box;
        }

        /* Subtle ghost-like presence on hover */
        body:hover .gallery-overlay {
            opacity: 0.25; 
        }

        .vision-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%); /* Full minimalist grayscale */
            border: 1px solid #1a1a1a;
            transition: filter 1s;
        }
        .vision-item:hover {
            filter: grayscale(0%); /* Full color on individual hover */
        }
    </style>
</head>
<body>

    <div class="gallery-overlay">
        <img src="images/penthouse.jpg" class="vision-item" title="DISCIPLINE">
        
        <img src="images/supercar.jpg" class="vision-item" title="PRECISION">
        
        <img src="images/sanctuary.jpg" class="vision-item" title="CONTROL">
        
        <img src="images/structure.jpg" class="vision-item" title="STRUCTURE">
    </div>

    <div class="pacer-container">
        <div class="circle"></div>
    </div>

</body>
</html>
