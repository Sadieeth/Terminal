<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leviathan Scope Terminal</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- THE BREATHING SCOPE (Z-Index 10) --- */
        .pacer-container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none; 
        }
        .circle {
            width: 80px;
            height: 80px;
            border: 1px solid #444; 
            border-radius: 50%;
            margin: 0 auto;
            animation: breathe 10s infinite ease-in-out;
            /* Added a subtle glow to make it the "center" of the scope */
            box-shadow: 0 0 40px rgba(255,255,255,0.05);
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(3.5); opacity: 1; border-color: #fff;}
        }

        /* --- THE CROSSHAIR GRID (Converging in the center) --- */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0; /* Zero gap so they meet in the center */
            padding: 0;
            opacity: 0; 
            transition: opacity 2s ease; 
            z-index: 1;
        }

        body:hover .gallery-overlay {
            opacity: 0.3; 
        }

        .vision-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%); 
            transition: filter 1s ease;
            border: 0.5px solid #111; /* Extremely thin crosshair lines */
        }

        /* ANCHORING: This forces the "focus" of each image to the center point */
        #top-left { object-position: bottom right; }
        #top-right { object-position: bottom left; }
        #bot-left { object-position: top right; }
        #bot-right { object-position: top left; }
        
        .vision-item:hover {
            filter: grayscale(0%);
        }
    </style>
</head>
<body>

    <div class="gallery-overlay">
        <img src="penthouse.jpg" id="top-left" class="vision-item">
        <img src="supercar.jpg" id="top-right" class="vision-item">
        <img src="sanctuary.jpg" id="bot-left" class="vision-item">
        <img src="structure.jpg" id="bot-right" class="vision-item">
    </div>

    <div class="pacer-container">
        <div class="circle"></div>
    </div>

</body>
</html>
