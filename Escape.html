<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leviathan Vision Escape</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BREATH PACER --- */
        .pacer-container {
            position: absolute;
            z-index: 10;
            pointer-events: none; 
        }
        .circle {
            width: 80px;
            height: 80px;
            border: 2px solid #333; 
            border-radius: 50%;
            animation: breathe 10s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(3.5); opacity: 1; border-color: #fff;}
        }

        /* --- THE GRID FIX --- */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%; /* Forces 50/50 split of the visible area */
            opacity: 0; 
            transition: opacity 2s ease; 
            z-index: 1;
        }

        body:hover .gallery-overlay {
            opacity: 0.3; 
        }

        .vision-item {
            width: 100%;
            height: 100%; /* Fills exactly half the screen height */
            object-fit: cover;
            filter: grayscale(100%); 
            border: 1px solid #111;
            transition: filter 1s;
        }
        
        .vision-item:hover {
            filter: grayscale(0%);
        }
    </style>
</head>
<body>

    <div class="gallery-overlay">
        <img src="penthouse.jpg" class="vision-item">
        <img src="structure.jpg" class="vision-item">
        <img src="sanctuary.jpg" class="vision-item">
        <img src="supercar.jpg" class="vision-item">
    </div>

    <div class="pacer-container">
        <div class="circle"></div>
    </div>

</body>
</html>
