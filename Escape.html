<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Escape Terminal</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BREATH PACER --- */
        .pacer-container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none; 
        }
        .circle {
            width: 80px;
            height: 80px;
            border: 2px solid #333;
            border-radius: 50%;
            margin: 0 auto;
            animation: breathe 10s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(3.5); opacity: 1; border-color: #fff; }
        }

        /* --- VISION GALLERY --- */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            opacity: 0;
            transition: opacity 2s ease;
            z-index: 1;
        }

        body:hover .gallery-overlay {
            opacity: 0.3; /* Subtle ghost presence */
        }

        .vision-item {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: grayscale(100%);
            border: 0.5px solid #111;
            transition: filter 0.8s;
        }
        
        /* Individual color pop on hover */
        .vision-item:hover {
            filter: grayscale(0%);
        }

        /* --- IMAGE SOURCES --- */
        #img1 { background-image: url('https://images.pexels.com/photos/37347/office-sitting-room-executive-sitting.jpg'); } /* Penthouse Office */
        #img2 { background-image: url('https://images.pexels.com/photos/3311574/pexels-photo-3311574.jpeg'); } /* Supercar */
        #img3 { background-image: url('https://images.pexels.com/photos/4034532/pexels-photo-4034532.jpeg'); } /* Zen Minimalist */
        #img4 { background-image: url('https://images.pexels.com/photos/1036936/pexels-photo-1036936.jpeg'); } /* Architecture */
    </style>
</head>
<body>

    <div class="gallery-overlay">
        <div id="img1" class="vision-item"></div>
        <div id="img2" class="vision-item"></div>
        <div id="img3" class="vision-item"></div>
        <div id="img4" class="vision-item"></div>
    </div>

    <div class="pacer-container">
        <div class="circle"></div>
    </div>

</body>
</html>
