<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Terminal</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BREATH PACER --- */
        .pacer-container {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        .circle {
            width: 100px;
            height: 100px;
            border: 2px solid #fff;
            border-radius: 50%;
            margin: 0 auto;
            animation: breathe 10s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(2.5); opacity: 1; }
        }
        .instruction {
            margin-top: 40px;
            font-size: 0.8em;
            letter-spacing: 3px;
            color: #444;
            text-transform: uppercase;
        }

        /* --- VISION GALLERY (Fades in on hover/scroll) --- */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
            opacity: 0;
            transition: opacity 1.5s ease;
            z-index: 1;
            pointer-events: none;
            box-sizing: border-box;
        }
        body:hover .gallery-overlay {
            opacity: 0.15; /* Subtle ghost-like presence */
        }
        .vision-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            border: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="gallery-overlay" id="gallery">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" class="vision-img">
        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab" class="vision-img">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" class="vision-img">
        <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750" class="vision-img">
    </div>

    <div class="pacer-container">
        <div class="circle"></div>
        <div class="instruction" id="text">Breathe</div>
    </div>

    <script>
        const text = document.getElementById('text');
        
        // Simple logic to change text with the animation cycle
        setInterval(() => {
            text.textContent = (text.textContent === "Inhale") ? "Exhale" : "Inhale";
        }, 5000);
    </script>
</body>
</html>
